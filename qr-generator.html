<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALDA — QR Generator (Tool)</title>
    <style>
        :root {
            --primary: #f4a261;
            --dark: #1a1a2e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--dark); margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #qrcode {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
        .back-link {
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>QR Generator ALDA</h1>
        <p>Gunakan alat ini untuk membuat QR Code yang mengarah ke link aplikasi ALDA di GitHub Pages.</p>
        
        <input type="text" id="url-input" placeholder="Masukkan URL GitHub Pages (e.g. https://user.github.io/alda/)" value="">
        <button onclick="generateQR()">Generate QR Code</button>

        <div id="qrcode"></div>
        
        <a href="index.html" class="back-link">← Kembali ke Aplikasi</a>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Set default value based on current location if it looks like a web server
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            document.getElementById('url-input').value = window.location.href.split('qr-generator.html')[0];
        } else {
            document.getElementById('url-input').value = "https://[username].github.io/alda/";
        }

        let qrcode = null;

        function generateQR() {
            const url = document.getElementById('url-input').value;
            if (!url) return alert('Masukkan URL terlebih dahulu');

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; // Clear existing

            qrcode = new QRCode(qrContainer, {
                text: url,
                width: 256,
                height: 256,
                colorDark : "#1a1a2e",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // Auto generate first time
        window.onload = generateQR;
    </script>
</body>
</html>

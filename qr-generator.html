<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALDA - QR Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f3;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { color: #A3D2CA; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card h2 { margin-top: 0; font-size: 24px; color: #4A4A4A; }
        .qr-container {
            margin: 20px 0;
            padding: 10px;
            background: white;
            border: 2px solid #eee;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background-color: #A3D2CA;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.05); background-color: #8dbcb4; }
        .download-all {
            margin-bottom: 40px;
            padding: 15px 40px;
            font-size: 18px;
            background-color: #4A4A4A;
        }
    </style>
</head>
<body>

    <h1>ALDA QR Card Generator</h1>
    
    <button id="download-all-btn" class="download-all">📦 Download Semua (ZIP)</button>

    <div class="grid" id="qr-grid">
        <!-- Cards will be injected here -->
    </div>

    <script>
        const emotions = [
            { id: 'senang', label: 'Senang' },
            { id: 'sedih', label: 'Sedih' },
            { id: 'marah', label: 'Marah' },
            { id: 'takut', label: 'Takut' },
            { id: 'terkejut', label: 'Terkejut' }
        ];

        const username = "alwnfarhn-netizen";
        const repo = "alda-web-ar";
        const baseUrl = `https://${username}.github.io/${repo}/`;
        const qrGrid = document.getElementById('qr-grid');
        const qrObjects = {};

        emotions.forEach(emotion => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const title = document.createElement('h2');
            title.innerText = emotion.label;
            card.appendChild(title);

            const qrContainer = document.createElement('div');
            qrContainer.className = 'qr-container';
            qrContainer.id = `qr-${emotion.id}`;
            card.appendChild(qrContainer);

            const downloadBtn = document.createElement('button');
            downloadBtn.innerText = '⬇️ Download PNG';
            downloadBtn.onclick = () => downloadSingle(emotion.id, emotion.label);
            card.appendChild(downloadBtn);

            qrGrid.appendChild(card);

            // Generate QR
            const qrcode = new QRCode(qrContainer, {
                text: `${baseUrl}?emosi=${emotion.id}`,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            qrObjects[emotion.id] = qrcode;
        });

        function downloadSingle(id, label) {
            const img = document.querySelector(`#qr-${id} img`);
            if (img) {
                const link = document.createElement('a');
                link.download = `QR_ALDA_${label}.png`;
                link.href = img.src;
                link.click();
            }
        }

        async function downloadAll() {
            const zip = new JSZip();
            const folder = zip.folder("QR_ALDA_Cards");

            for (const emotion of emotions) {
                const img = document.querySelector(`#qr-${emotion.id} img`);
                if (img) {
                    const dataUrl = img.src;
                    const base64Data = dataUrl.replace(/^data:image\/png;base64,/, "");
                    folder.file(`QR_ALDA_${emotion.label}.png`, base64Data, {base64: true});
                }
            }

            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "ALDA_QR_Cards.zip");
        }

        document.getElementById('download-all-btn').onclick = downloadAll;
    </script>
</body>
</html>
